{% extends 'base.html' %}
{% block content %}
<section class="hero" style="max-width: 480px; margin: 0 auto;">
  <h2>Inicia sesión</h2>
  <p>Accede a tu cuenta para usar el dashboard de salud y análisis con IA.</p>
  <form action="" method="post" class="form-card">
    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required>

    <button type="submit" class="button" style="width:100%;justify-content:center;">Iniciar sesión</button>
  </form>
  <div class="auth-footer">
    <p>¿Eres nuevo? <a href="{{ url_for('registrar') }}">Regístrate aquí</a></p>
  </div>
</section>
{% endblock %}
