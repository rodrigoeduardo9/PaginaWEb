{% extends 'base.html' %}
{% block content %}
<section class="hero" style="max-width: 560px; margin: 0 auto;">
  <h2>📸 Cargar imagen para análisis</h2>
  <p>Sube una imagen de retina para que la IA la analice y detecte posibles riesgos metabólicos.</p>
  <form action="" method="post" enctype="multipart/form-data" class="form-card">
    <label for="imagen">Seleccionar imagen (JPG, PNG o BMP)</label>
    <input type="file" id="imagen" name="imagen" accept="image/png,image/jpeg,image/bmp" required>
    <button type="submit" class="button secondary" style="width:100%;justify-content:center;">🚀 Subir y analizar</button>
  </form>
  {% if uploaded_filename %}
  <div class="alert success">
    <p>Archivo "{{ uploaded_filename }}" cargado correctamente.</p>
  </div>
  {% endif %}
</section>
{% endblock %}
