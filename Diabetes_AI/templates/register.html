{% extends 'base.html' %}
{% block content %}
<section class="hero" style="max-width: 520px; margin: 0 auto;">
  <h2>Registro de usuario</h2>
  <p>Crea una cuenta para comenzar a monitorear tu salud.</p>
  <form action="" method="post" class="form-card">
    <label for="nombre_completo">Nombre completo</label>
    <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Tu nombre" required>

    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>

    <button type="submit" class="button" style="width:100%;justify-content:center;">Crear cuenta</button>
  </form>
  <div class="auth-footer">
    <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
  </div>
</section>
{% endblock %}
